services:
  # === Web Application ===
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:80
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # === CLI Tools (existing) ===
  generate:
    build: .
    entrypoint: ["python", "generate_image.py"]
    env_file:
      - .env
    volumes:
      - ./output:/app/output

  slides:
    build: .
    entrypoint: ["python", "create_slides.py"]
    volumes:
      - ./output:/app/output

  pptx:
    build: .
    entrypoint: ["python", "create_pptx.py"]
    volumes:
      - ./output:/app/output
